name: Security Register Role Guard

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  register-role-guard:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/ci.db
      JWT_SECRET: ci-test-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply Prisma Schema
        run: npx prisma db push

      - name: Run Register Role Guard Test
        run: npm run test:security:register-role
